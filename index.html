<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Q4 Drill 2</title>
    <!-- CSS -->
    <link rel="stylesheet" type="text/css" href="styles.css">
    <!-- Bootstrap -->
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>  
</head>
<body>

<div class="container text-center mt-5">
    <div class="card p-4 shadow-lg">

        <h1 class="text-danger">Heat Index Checker</h1>

        <!-- TOGGLE NOTE -->
        <details>
            <summary><strong>Note:</strong></summary>
            <p>Input the temperature (°C) and humidity (%), then click Check to see the heat index and its status.</p>
        </details>

        <!-- INPUTS -->
        <div class="mt-3">
            <label>Degree in °C</label>
            <input type="number" id="temp" class="form-control" placeholder="Input degree value">
        </div>

        <div class="mt-3">
            <label>Humidity in %</label>
            <input type="number" id="humidity" class="form-control" placeholder="Input percentage value">
        </div>

        <!-- BUTTON -->
        <button class="btn btn-danger mt-3" onclick="checkHeatIndex()">Check</button>

    </div>
</div>

<!-- JS -->
<script src="main.js"></script>

</body>
</html>
